{% load bootstrap5 %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    {% bootstrap_css %}
</head>
<body class="bg-light d-flex align-items-center" style="height: 100vh;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">

                <div class="card shadow-sm p-4">
                    
                    <h3 class="text-center mb-4">🔐 Login</h3>

                    <form action="{% url 'urlentrar' %}" method="POST">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Usuário</label>
                            <input type="text" name="txtUser" placeholder="Digite seu usuário..." class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Senha</label>
                            <input type="password" name="txtPass" placeholder="Digite sua senha..." class="form-control" required>
                        </div>

                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-primary btn-lg">
                                🚀 Entrar
                            </button>
                        </div>

                        <div class="text-center">
                            <small>
                                Não tem conta? 
                                <a href="{% url 'urlcadastrarUsuario' %}">Cadastre-se</a>
                            </small>
                        </div>
                    </form>

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-danger mt-3 text-center">
                                {{ message }}
                            </div>
                        {% endfor %}
                    {% endif %}

                </div>

            </div>
        </div>
    </div>

</body>
</html>
