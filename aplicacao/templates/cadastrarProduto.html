{% extends 'global/base.html' %}

{% block title %}
  Novo Produto
{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow-sm p-4">
        <h3 class="text-center mb-4">📦 Cadastro de Produto</h3>

        <form action="{% url 'urlsalvarProduto' %}" method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="txtNome" class="form-label fw-semibold">Nome do Produto</label>
                <input type="text" id="txtNome" name="txtNome" placeholder="Digite o nome do produto..." class="form-control">
            </div>

            <div class="row">
                <div class="mb-3 col-md-6">
                    <label for="txtPreco" class="form-label fw-semibold">Preço</label>
                    <input type="text" id="txtPreco" name="txtPreco" placeholder="R$ 0,00" class="form-control">
                </div>

                <div class="mb-3 col-md-6">
                    <label for="txtQtde" class="form-label fw-semibold">Quantidade</label>
                    <input type="number" id="txtQtde" name="txtQtde" placeholder="0" class="form-control">
                </div>
            </div>

            <div class="mb-3">
                <label for="txtData" class="form-label fw-semibold">Data de Compra</label>
                <input type="date" id="txtData" name="txtData" class="form-control">
            </div>

            <div class="mb-3">
                <label for="txtDescricao" class="form-label fw-semibold">Descrição</label>
                <textarea id="txtDescricao" name="txtDescricao" placeholder="Digite a descrição do produto..." class="form-control" rows="3"></textarea>
            </div>

            <div class="mb-4">
                <label for="txtImagem" class="form-label fw-semibold">Imagem do Produto</label>
                <input type="file" id="txtImagem" name="txtImagem" class="form-control">
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-success btn-lg">
                    💾 Salvar Produto
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
