{% extends 'global/base.html' %}

{% block title %}
    Editar Produto
{% endblock %}

{% block content %}
<div class="container mt-4">
    <h2 class="mb-4">Editar Produto</h2>
    
    <form action="{% url 'urleditarProduto' p.id %}" method="POST">
        {% csrf_token %}

        <!-- Nome -->
        <div class="mb-3">
            <label for="txtNome" class="form-label">Nome do Produto</label>
            <input type="text" id="txtNome" name="txtNome" value="{{ p.nome }}" class="form-control" placeholder="Digite o nome do produto...">
        </div>

        <!-- Preço -->
        <div class="mb-3">
            <label for="txtPreco" class="form-label">Preço</label>
            <input type="text" id="txtPreco" name="txtPreco" value="{{ p.preco }}" class="form-control" placeholder="Digite o preço do produto...">
        </div>

        <!-- Quantidade -->
        <div class="mb-3">
            <label for="txtQtde" class="form-label">Quantidade</label>
            <input type="number" id="txtQtde" name="txtQtde" value="{{ p.qtde }}" class="form-control" placeholder="Digite a quantidade...">
        </div>

        <!-- Data -->
        <div class="mb-3">
            <label for="txtData" class="form-label">Data</label>
            <input type="date" id="txtData" name="txtData" value="{{ p.data }}" class="form-control">
        </div>

        <!-- Descrição -->
        <div class="mb-3">
            <label for="txtDescricao" class="form-label">Descrição</label>
            <textarea id="txtDescricao" name="txtDescricao" class="form-control" rows="4" placeholder="Digite a descrição do produto...">{{ p.descricao }}</textarea>
        </div>

        <!-- Botão -->
        <div class="d-flex justify-content-between">
            <a href="{% url 'urlproduto' %}" class="btn btn-secondary">
                ⬅ Voltar
            </a>
            <button type="submit" class="btn btn-success">
                💾 Salvar
            </button>
        </div>

    </form>
</div>
{% endblock %}
